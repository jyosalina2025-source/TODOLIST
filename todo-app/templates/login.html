<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="flash-container">
        {% for category, message in messages %}
            <p class="flash {{ category }}">{{ message }}</p>
        {% endfor %}
        </div>
    {% endif %}
    {% endwith %}

<div class="container">

    <div class="theme-switch">
        <input type="checkbox" id="darkToggle" onclick="toggleDarkMode()">
        <label for="darkToggle" class="switch">
            <span class="icon light">☀️</span>
            <span class="icon dark">🌙</span>
            <span class="slider"></span>
        </label>
    </div>

    <div class="carabao-login">
        <svg class="carabao-svg" width="90" height="80" viewBox="0 0 90 80" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Body -->
            <ellipse cx="45" cy="52" rx="26" ry="18" fill="#7C3AED" opacity="0.85"/>
            <!-- Head -->
            <ellipse cx="63" cy="38" rx="14" ry="12" fill="#7C3AED" opacity="0.85"/>
            <path d="M55 28 Q50 16 44 18 Q48 22 53 26" fill="#5B21B6" stroke="#5B21B6" stroke-width="1"/>
            <path d="M68 27 Q72 15 78 17 Q74 22 70 26" fill="#5B21B6" stroke="#5B21B6" stroke-width="1"/>
            <ellipse cx="74" cy="43" rx="7" ry="5" fill="#A78BFA"/>
            <circle cx="72" cy="43" r="1.2" fill="#5B21B6"/>
            <circle cx="76" cy="43" r="1.2" fill="#5B21B6"/>
            <circle cx="64" cy="34" r="2.5" fill="white"/>
            <circle cx="64.8" cy="34" r="1.2" fill="#1E1333"/>
            <ellipse cx="55" cy="31" rx="4" ry="5" fill="#A78BFA" transform="rotate(-15 55 31)"/>
            <rect x="28" y="66" width="7" height="13" rx="3" fill="#5B21B6"/>
            <rect x="39" y="68" width="7" height="11" rx="3" fill="#5B21B6"/>
            <rect x="50" y="68" width="7" height="11" rx="3" fill="#5B21B6"/>
            <rect x="59" y="66" width="7" height="13" rx="3" fill="#5B21B6"/>
            <path d="M20 48 Q10 44 11 38 Q12 32 18 34" stroke="#A78BFA" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>
        <p style="font-size:12px;color:var(--text-muted);font-weight:500;margin:0;">Kumusta! Mag-login ka na 🐃</p>
    </div>

    <h2>Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required autocomplete="username">
        <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
        <button type="submit">Login</button>
    </form>

    <a href="/register">Register</a>
</div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
    const toggle = document.getElementById("darkToggle");
    localStorage.setItem("dark", toggle.checked ? "on" : "off");
}
window.onload = function () {
    const toggle = document.getElementById("darkToggle");
    if (localStorage.getItem("dark") === "on") {
        document.body.classList.add("dark-mode");
        toggle.checked = true;
    }
}

setTimeout(() => {
    const flashes = document.querySelectorAll(".flash");

    flashes.forEach(flash => {
        flash.style.transition = "opacity 0.5s ease, transform 0.5s ease";
        flash.style.opacity = "0";
        flash.style.transform = "translateY(-10px)";

        setTimeout(() => {
            flash.remove();
        }, 500);
    });

}, 3000);
</script>

<script src="{{ url_for('static', filename='js/flash.js') }}"></script>

</body>
</html>
